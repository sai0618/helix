apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "user-portal.fullname" . }}
  labels:
    {{- include "user-portal.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "user-portal.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}
    {{- if eq .Values.deploymentStrategy.type "RollingUpdate" }}
    rollingUpdate:
      {{- toYaml .Values.deploymentStrategy.rollingUpdate | nindent 6 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "user-portal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.version | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "user-portal.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: user-portal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "user-portal.fullname" . }}
          env:
            - name: SERVICE_NAME
              value: "user-portal"
            - name: APP_ENV
              value: {{ .Values.environment | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: OTEL_TRACES_ENABLED
              value: {{ .Values.tracing.enabled | quote }}
            - name: OTEL_TRACES_SAMPLE_RATE
              value: {{ .Values.tracing.sampleRate | quote }}
            - name: OTEL_EXPORTER_GCP_TRACE_PROJECT_ID
              value: {{ .Values.tracing.projectId | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if not .Values.secretManager.enabled }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "user-portal.fullname" .) .Values.config.existingSecret }}
                  key: {{ ternary .Values.config.mysqlPasswordKey "MYSQL_PASSWORD" (ne .Values.config.existingSecret "") }}
            - name: APP_LOGIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "user-portal.fullname" . }}
                  key: APP_LOGIN_USERNAME
            {{- if .Values.appLogin.passwordHash }}
            - name: APP_LOGIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "user-portal.fullname" . }}
                  key: APP_LOGIN_PASSWORD_HASH
            {{- else }}
            - name: APP_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "user-portal.fullname" . }}
                  key: APP_LOGIN_PASSWORD
            {{- end }}
            {{- end }}
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "user-portal.fullname" . }}
                  key: FLASK_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.secretManager.enabled }}
          volumeMounts:
            - name: secret-manager
              mountPath: {{ .Values.secretManager.mountPath | quote }}
              readOnly: true
          {{- end }}
      {{- if .Values.secretManager.enabled }}
      volumes:
        - name: secret-manager
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ default (include "user-portal.fullname" .) .Values.secretManager.providerClassName | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
